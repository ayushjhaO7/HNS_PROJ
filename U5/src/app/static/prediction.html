<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Engine | AI Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: rgba(17, 24, 39, 0.7); --border: rgba(255, 255, 255, 0.08); --accent: #6366f1; --high: #ef4444; --med: #f59e0b; --low: #10b981; --text: #f9fafb; --text-muted: #9ca3af; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 2rem; }

        #container { display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; width: 100%; max-width: 1600px; height: 850px; }

        .glass-panel { background: var(--card); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 28px; padding: 2.25rem; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
        h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }

        /* Predictor Styles */
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.6rem; letter-spacing: 1px; }
        select { width: 100%; padding: 1.1rem; background: #000; border: 1px solid var(--border); border-radius: 14px; color: #fff; appearance: none; cursor: pointer; transition: 0.3s; margin-bottom: 1.25rem; outline: none; font-weight: 600; }
        select:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(99,102,241,0.2); }
        .risk-box { margin-top: 1.5rem; text-align: center; border-radius: 18px; padding: 1.5rem; display: none; background: rgba(255,255,255,0.02); border: 1px solid var(--border); }

        /* Analytical Engine Styles */
        .terminal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
        .dropdown-container { margin-bottom: 1.5rem; }
        
        .result-container { flex: 1; overflow-y: auto; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: #e5e7eb; }
        th { text-align: left; padding: 1.25rem; background: rgba(255,255,255,0.04); color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 1px; font-size: 0.65rem; }
        td { padding: 1.1rem; border-bottom: 1px solid var(--border); }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--card); z-index: 10; display: none; }
        .error-msg { padding: 2rem; color: var(--high); text-align: center; font-weight: 700; }
        .empty-msg { padding: 3rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="container">
        <!-- 1: District Predictor (Sidebar) -->
        <div class="glass-panel">
            <h1><span style="font-size:1.5rem">🎯</span> Predictor</h1>
            <div class="field">
                <label>STATE / UT</label>
                <select id="state-sel" onchange="loadDistricts()"><option>Syncing System...</option></select>
            </div>
            <div class="field">
                <label>DISTRICT</label>
                <select id="dist-sel" onchange="analyzeDistrict()"><option>Select State First</option></select>
            </div>
            <div id="risk-output" class="risk-box">
                <div id="risk-level" style="font-size: 2.2rem; font-weight: 800; margin-bottom: 0.4rem">--</div>
                <div id="risk-breakdown" style="font-size:0.75rem; text-align:left; border-top:1px solid var(--border); padding-top:1rem; line-height:1.7; color: var(--text-muted)"></div>
            </div>
        </div>

        <!-- 2: AI Analytical Hub (Main Content) -->
        <div class="glass-panel">
            <div class="terminal-header">
                <div>
                    <h1 style="margin-bottom:0.25rem"><span style="font-size:1.5rem">⚡</span> AI Analytical Hub</h1>
                    <p style="color:var(--text-muted); font-size:0.85rem">Automated PySpark Distributed Queries</p>
                </div>
                <span id="spark-status" style="font-size:0.6rem; color:var(--low); font-weight:800; text-transform:uppercase; border: 1px solid var(--low); padding: 4px 10px; border-radius: 99px">Spark Active</span>
            </div>

            <div class="dropdown-container">
                <label>Select Analytical Topic</label>
                <select id="topic-sel" onchange="autoRunQuery()">
                    <option value="" disabled selected>Choose a specific analysis topic...</option>
                    <option value="1">Top 3 High-Crime States each Year</option>
                    <option value="2">Avg crimes per district per year</option>
                    <option value="3">Murder vs Theft comparison by State</option>
                    <option value="4">Most dangerous Districts (Cumulative)</option>
                    <option value="5">Crimes Against Women Ranking</option>
                    <option value="6">Yearly Crime Pulse (IPC Trend)</option>
                    <option value="7">States with Highest Hurt Crimes</option>
                    <option value="8">Theft vs Auto-Theft by State</option>
                    <option value="9">Top 10 Districts by Burglary</option>
                    <option value="10">Safest States (Lowest Total Crime)</option>
                </select>
            </div>

            <div id="result-view" class="result-container">
                <div id="loader" class="loader">
                    <div style="text-align:center">
                        <div style="font-size:1.5rem; margin-bottom:0.5rem">⚙️</div>
                        <div style="font-weight:700; letter-spacing:1px; text-transform:uppercase; font-size:0.7rem">Spark cluster processing...</div>
                    </div>
                </div>
                <div id="empty-hint" class="empty-msg">
                    Select an analytical topic from the dropdown to run the Spark engine.
                </div>
                <div id="table-anchor"></div>
            </div>
        </div>
    </div>

    <script>
        const SQL_LIBRARY = {
            1: "SELECT YEAR, `STATE/UT`, TOTAL FROM (SELECT YEAR, `STATE/UT`, SUM(`TOTAL IPC CRIMES`) as TOTAL, DENSE_RANK() OVER(PARTITION BY YEAR ORDER BY SUM(`TOTAL IPC CRIMES`) DESC) as rk FROM crimes GROUP BY YEAR, `STATE/UT`) WHERE rk <= 3 ORDER BY YEAR DESC, rk ASC",
            2: "SELECT YEAR, ROUND(AVG(`TOTAL IPC CRIMES`), 2) as Avg_Crimes_Per_District FROM crimes GROUP BY YEAR ORDER BY YEAR DESC",
            3: "SELECT `STATE/UT`, SUM(MURDER) as Total_Murders, SUM(THEFT) as Total_Thefts FROM crimes GROUP BY `STATE/UT` ORDER BY Total_Murders DESC LIMIT 15",
            4: "SELECT `STATE/UT`, DISTRICT, SUM(`TOTAL IPC CRIMES`) as Grand_Total FROM crimes GROUP BY `STATE/UT`, DISTRICT ORDER BY Grand_Total DESC LIMIT 20",
            5: "SELECT `STATE/UT`, SUM(RAPE) + SUM(`DOWRY DEATHS`) + SUM(`CRUELTY BY HUSBAND OR HIS RELATIVES`) as Total_Women_Crimes FROM crimes GROUP BY `STATE/UT` ORDER BY Total_Women_Crimes DESC LIMIT 15",
            6: "SELECT YEAR, SUM(`TOTAL IPC CRIMES`) as Total_IPC FROM crimes GROUP BY YEAR ORDER BY YEAR DESC",
            7: "SELECT `STATE/UT`, SUM(`HURT/GREVIOUS HURT`) as Total_Hurt FROM crimes GROUP BY `STATE/UT` ORDER BY Total_Hurt DESC LIMIT 10",
            8: "SELECT `STATE/UT`, SUM(THEFT) as Theft, SUM(`AUTO THEFT`) as Auto_Theft FROM crimes GROUP BY `STATE/UT` ORDER BY Theft DESC LIMIT 10",
            9: "SELECT DISTRICT, `STATE/UT`, SUM(BURGLARY) as Total_Burglary FROM crimes GROUP BY DISTRICT, `STATE/UT` ORDER BY Total_Burglary DESC LIMIT 10",
            10: "SELECT `STATE/UT`, SUM(`TOTAL IPC CRIMES`) as Grand_Total FROM crimes GROUP BY `STATE/UT` ORDER BY Grand_Total ASC LIMIT 10"
        };

        let hierarchy = {};

        async function init() {
            try {
                const res = await fetch('/api/hierarchy');
                hierarchy = await res.json();
                const sel = document.getElementById('state-sel');
                sel.innerHTML = '<option value="">Choose State...</option>';
                Object.keys(hierarchy).sort().forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
            } catch(e) { console.error(e); }
        }

        function loadDistricts() {
            const state = document.getElementById('state-sel').value;
            const sel = document.getElementById('dist-sel');
            sel.innerHTML = '<option value="">Choose District...</option>';
            if(state && hierarchy[state]) hierarchy[state].sort().forEach(d => sel.innerHTML += `<option value="${d}">${d}</option>`);
        }

        async function analyzeDistrict() {
            const s = document.getElementById('state-sel').value;
            const d = document.getElementById('dist-sel').value;
            if(!s || !d) return;
            const res = await fetch(`/api/predict-district?state=${encodeURIComponent(s)}&district=${encodeURIComponent(d)}`);
            const data = await res.json();
            const box = document.getElementById('risk-output');
            const val = document.getElementById('risk-level');
            box.style.display = 'block';
            val.innerText = data.risk;
            const clr = data.risk.includes('High') ? 'var(--high)' : (data.risk.includes('Med') ? 'var(--med)' : 'var(--low)');
            val.style.color = clr; box.style.background = `${clr}10`; box.style.borderColor = `${clr}20`;
            document.getElementById('risk-breakdown').innerHTML = Object.entries(data.features).map(([k,v])=>`<div><b>${k}:</b> ${Math.round(v).toLocaleString()}</div>`).join('');
        }

        async function autoRunQuery() {
            const id = document.getElementById('topic-sel').value;
            if(!id) return;
            
            const query = SQL_LIBRARY[id];
            const loader = document.getElementById('loader');
            const hint = document.getElementById('empty-hint');
            const anchor = document.getElementById('table-anchor');
            
            loader.style.display = 'flex';
            hint.style.display = 'none';
            anchor.innerHTML = '';

            try {
                const res = await fetch('/api/query', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query})
                });
                const data = await res.json();
                loader.style.display = 'none';

                if(data.error) {
                    anchor.innerHTML = `<div class="error-msg">⚠️ ${data.error}</div>`;
                    return;
                }

                if(data.length > 0) {
                    let html = '<table><thead><tr>';
                    Object.keys(data[0]).forEach(k => html += `<th>${k}</th>`);
                    html += '</tr></thead><tbody>';
                    data.forEach(row => {
                        html += '<tr>';
                        Object.values(row).forEach(v => html += `<td>${typeof v === 'number' ? v.toLocaleString() : v}</td>`);
                        html += '</tr>';
                    });
                    anchor.innerHTML = html + '</tbody></table>';
                }
            } catch(e) {
                loader.style.display = 'none';
                anchor.innerHTML = `<div class="error-msg">⚠️ System Connection Error</div>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
