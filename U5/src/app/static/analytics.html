<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District Visual Analytics | Indian Hotspot Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #030712; --card: rgba(17, 24, 39, 0.7); --border: rgba(255, 255, 255, 0.08); --accent: #6366f1; --high: #ef4444; --med: #f59e0b; --low: #10b981; --text: #f9fafb; --text-muted: #9ca3af; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: grid; grid-template-columns: 1fr 380px; overflow: hidden; }

        /* Left side: Map Hub */
        #map-root { position: relative; border-right: 1px solid var(--border); }
        #map { height: 100%; width: 100%; background: #010309; }
        .map-overlay { position: absolute; top: 1.5rem; left: 1.5rem; z-index: 1000; pointer-events: none; }
        .map-card { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.25rem; }

        /* Right side: Pulse List */
        #pulse-sidebar { background: #000; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
        .sidebar-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .pulse-card { background: var(--card); border: 1px solid var(--border); padding: 1.25rem; border-radius: 16px; transition: 0.3s; cursor: default; }
        .pulse-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.03); transform: translateX(5px); }
        .bar-container { height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 0.75rem; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .legend { background: var(--card); backdrop-filter: blur(10px); padding: 1rem; border-radius: 12px; color: #fff; border: 1px solid var(--border); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .legend i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }

        .mode-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 0.5rem 0.8rem; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.7rem; font-weight: 600; }
        .mode-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>
    <div id="map-root">
        <div class="map-overlay">
            <div class="map-card">
                <div style="color:var(--accent); font-weight:800; font-size:0.7rem; text-transform:uppercase; margin-bottom:0.5rem">Unit V: Final Visual Cluster</div>
                <h1>Analysis <span style="color:var(--accent); font-weight:400">Hub</span></h1>
                <p style="color:var(--text-muted); font-size:0.85rem">State-Level Crime Risk Choropleth</p>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <div id="pulse-sidebar">
        <div class="sidebar-header">
            <h2 style="font-size:1.1rem; display:flex; align-items:center; gap:0.5rem">🔥 Critical Districts</h2>
            <p style="color:var(--text-muted); font-size:0.7rem">Highest intensity pulse zones</p>
        </div>
        <div id="pulse-content"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, choroplethLayer;
        
        function getHighImpactColor(v) {
            return v > 20000 ? '#ef4444' : 
                   v > 10000 ? '#f59e0b' : 
                               '#10b981';
        }

        function getRiskColor(score) {
            return score === 3 ? '#e74c3c' : 
                   score === 2 ? '#f39c12' : 
                   score === 1 ? '#2ecc71' : 
                                 'lightgray';
        }

        async function init() {
            console.log("[INIT] Initializing map...");
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22.5, 78.9], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            try {
                // Fetch Intensity for sidebar
                const intRes = await fetch('/api/district-intensity');
                const intData = await intRes.json();
                
                // Fetch State Risks for Choropleth
                const riskRes = await fetch('/api/state-risk');
                const riskData = await riskRes.json();

                await loadChoropleth(riskData);
                choroplethLayer.addTo(map);
                loadPulse(intData.sort((a,b) => b.total - a.total).slice(0, 20));
                updateLegend('CRIME RISK LEGEND', ['#e74c3c HIGH RISK', '#f39c12 MEDIUM RISK', '#2ecc71 LOW RISK', 'lightgray NO DATA']);

            } catch(e) { 
                console.error("[ERROR]", e);
                document.getElementById('pulse-content').innerHTML = `<div style="color:#ef4444">Sync Error: Check Console</div>`;
            }
        }



        async function loadChoropleth(stateRisks) {
            const geoJsonUrl = "https://raw.githubusercontent.com/geohacker/india/master/state/india_telengana.geojson";
            const res = await fetch(geoJsonUrl);
            const indiaGeo = await res.json();

            choroplethLayer = L.geoJson(indiaGeo, {
                style: function(feature) {
                    const name = feature.properties.NAME_1;
                    const r = stateRisks[name] || {risk_score: 0};
                    return {
                        fillColor: getRiskColor(r.risk_score),
                        weight: 1,
                        opacity: 0.4,
                        color: 'rgba(255,255,255,0.3)',
                        fillOpacity: 0.85
                    };
                },
                onEachFeature: function(feature, layer) {
                    const name = feature.properties.NAME_1;
                    const r = stateRisks[name];
                    if (r) {
                        // Build feature breakdown HTML
                        let featureHtml = '';
                        const feats = r.features || {};
                        for (const [key, val] of Object.entries(feats)) {
                            const shortName = key.length > 18 ? key.substring(0, 18) + '…' : key;
                            featureHtml += `<tr><td style="padding:2px 8px 2px 0; color:#6b7280">${shortName}</td><td style="font-weight:700; text-align:right">${val.toLocaleString()}</td></tr>`;
                        }

                        const tooltipContent = `
                            <div style="font-family:'Plus Jakarta Sans',sans-serif; min-width:180px">
                                <div style="font-size:1.05rem; font-weight:800; margin-bottom:4px">${name}</div>
                                <div style="color:${getRiskColor(r.risk_score)}; font-weight:800; font-size:0.85rem; margin-bottom:6px">
                                    Risk Level: ${r.risk_level}
                                </div>
                                <div style="border-top:1px solid #e5e7eb; padding-top:6px; margin-bottom:4px">
                                    <span style="font-weight:800; font-size:1.1rem">${r.total_crimes.toLocaleString()}</span>
                                    <span style="color:#6b7280; font-size:0.75rem"> Total Crimes</span>
                                </div>
                                <table style="font-size:0.78rem; width:100%; border-collapse:collapse">
                                    ${featureHtml}
                                </table>
                            </div>`;
                        layer.bindTooltip(tooltipContent, { sticky: true, direction: 'auto', opacity: 0.95 });
                    }
                    layer.on({
                        mouseover: (e) => { 
                            e.target.setStyle({ fillOpacity: 0.95, weight: 3, color: '#fff' }); 
                            e.target.bringToFront();
                        },
                        mouseout: (e) => { choroplethLayer.resetStyle(e.target); }
                    });
                }
            });
        }



        function updateLegend(title, items) {
            const legendDiv = document.querySelector('.legend');
            if (legendDiv) legendDiv.remove();
            
            const legend = L.control({position: 'bottomleft'});
            legend.onAdd = () => {
                const div = L.DomUtil.create('div', 'legend');
                let html = `<div style="margin-bottom:8px; font-weight:800; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px">${title}</div>`;
                items.forEach(item => {
                    const spaceIdx = item.indexOf(' ');
                    const color = item.substring(0, spaceIdx);
                    const label = item.substring(spaceIdx + 1);
                    html += `<div style="margin-bottom:5px"><i style="background:${color}"></i> ${label}</div>`;
                });
                html += `<div style="margin-top:8px; font-style:italic; color:var(--text-muted); font-size:0.6rem">Hover over state for details</div>`;
                div.innerHTML = html;
                return div;
            };
            legend.addTo(map);
        }

        function loadPulse(data) {
            const root = document.getElementById('pulse-content');
            root.innerHTML = '';
            if (data.length === 0) return;
            const max = data[0].total;
            data.forEach(d => {
                const pct = (d.total/max)*100;
                const clr = getHighImpactColor(d.total);
                root.innerHTML += `
                    <div class="pulse-card">
                        <div style="font-weight:800; font-size:0.85rem">${d.district}</div>
                        <div style="color:var(--text-muted); font-size:0.65rem">${d.state}</div>
                        <div class="bar-container"><div class="bar-fill" style="width:${pct}%; background:${clr}"></div></div>
                        <div style="font-weight:800; font-size:0.75rem; color:${clr}; margin-top:0.4rem">${Math.round(d.total).toLocaleString()}</div>
                    </div>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
